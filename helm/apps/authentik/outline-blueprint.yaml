apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprint-outline
  namespace: authentik
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: blueprint
    blueprints.goauthentik.io/instantiate: "true"
data:
  outline.yaml: |
    # yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
    version: 1
    metadata:
      name: vasary-outline-oauth
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_core.group
        id: outline-users-group
        state: present
        identifiers:
          name: outline-users
        attrs:
          name: outline-users
      - model: authentik_providers_oauth2.scopemapping
        id: outline-email-scope
        state: present
        identifiers:
          name: outline-email-verified
        attrs:
          name: outline-email-verified
          scope_name: email
          description: Email scope for Outline with verified email claim
          expression: |
            return {
                "email": request.user.email,
                "email_verified": True,
            }
      - model: authentik_providers_oauth2.oauth2provider
        id: outline-oauth-provider
        state: present
        identifiers:
          name: outline
        attrs:
          name: outline
          client_type: confidential
          client_id: outline
          client_secret: !Env [OUTLINE_OAUTH_CLIENT_SECRET, ""]
          grant_types:
            - authorization_code
            - refresh_token
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-explicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
            - !KeyOf outline-email-scope
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
          redirect_uris:
            - matching_mode: strict
              url: https://outline.vasary.org/auth/oidc.callback
          sub_mode: user_email
          issuer_mode: per_provider
      - model: authentik_core.application
        id: outline-application
        state: present
        identifiers:
          slug: outline
        attrs:
          name: Outline
          slug: outline
          provider: !KeyOf outline-oauth-provider
          policy_engine_mode: any
          meta_launch_url: https://outline.vasary.org/
          open_in_new_tab: true
      - model: authentik_policies.policybinding
        id: outline-users-policy-binding
        state: present
        identifiers:
          target: !KeyOf outline-application
          group: !KeyOf outline-users-group
          order: 0
        attrs:
          target: !KeyOf outline-application
          group: !KeyOf outline-users-group
          order: 0
