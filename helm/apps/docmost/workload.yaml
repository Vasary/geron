apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: docmost-storage
  namespace: docmost
spec:
  storageClassName: nfs
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docmost
  namespace: docmost
  labels:
    app.kubernetes.io/name: docmost
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: docmost
  template:
    metadata:
      labels:
        app.kubernetes.io/name: docmost
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: docmost
          image: docmost/docmost:0.95.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: APP_URL
              value: https://docmost.vasary.org
            - name: PORT
              value: "3000"
            - name: STORAGE_DRIVER
              value: local
            - name: REDIS_URL
              value: redis://docmost-redis:6379
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: docmost-secrets
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: docmost-secrets
                  key: password
            - name: DB_DATABASE
              value: docmost
            - name: DATABASE_URL
              value: postgresql://$(DB_USERNAME):$(DB_PASSWORD)@docmost-postgres-rw:5432/$(DB_DATABASE)?schema=public
          envFrom:
            - secretRef:
                name: docmost-secrets
          volumeMounts:
            - name: storage
              mountPath: /app/data/storage
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 2Gi
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: docmost-storage
---
apiVersion: v1
kind: Service
metadata:
  name: docmost
  namespace: docmost
spec:
  selector:
    app.kubernetes.io/name: docmost
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: docmost
  namespace: docmost
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    geron.io/dns-scope: internal
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  tls:
    - secretName: docmost-vasary-tls
      hosts:
        - docmost.vasary.org
  rules:
    - host: docmost.vasary.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: docmost
                port:
                  name: http
