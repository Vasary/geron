apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprint-grafana
  namespace: authentik
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: blueprint
    blueprints.goauthentik.io/instantiate: "true"
data:
  grafana.yaml: |
    # yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
    version: 1
    metadata:
      name: vasary-grafana-oauth
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_core.group
        id: grafana-admins-group
        state: present
        identifiers:
          name: grafana-admins
        attrs:
          name: grafana-admins
      - model: authentik_core.group
        id: grafana-editors-group
        state: present
        identifiers:
          name: grafana-editors
        attrs:
          name: grafana-editors
      - model: authentik_core.group
        id: grafana-viewers-group
        state: present
        identifiers:
          name: grafana-viewers
        attrs:
          name: grafana-viewers
      - model: authentik_providers_oauth2.oauth2provider
        id: grafana-oauth-provider
        state: present
        identifiers:
          name: grafana
        attrs:
          name: grafana
          client_type: confidential
          client_id: grafana
          client_secret: !Env [GRAFANA_OAUTH_CLIENT_SECRET, ""]
          grant_types:
            - authorization_code
            - refresh_token
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-explicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, entitlements]]
          redirect_uris:
            - matching_mode: strict
              url: https://grafana.vasary.org/login/generic_oauth
          sub_mode: user_email
          issuer_mode: global
      - model: authentik_core.application
        id: grafana-application
        state: present
        identifiers:
          slug: grafana
        attrs:
          name: Grafana
          slug: grafana
          provider: !KeyOf grafana-oauth-provider
          policy_engine_mode: any
          meta_launch_url: https://grafana.vasary.org/
          open_in_new_tab: true
      - model: authentik_core.applicationentitlement
        id: grafana-admins-entitlement
        state: present
        identifiers:
          name: Grafana Admins
          app: !KeyOf grafana-application
        attrs:
          name: Grafana Admins
          app: !KeyOf grafana-application
      - model: authentik_core.applicationentitlement
        id: grafana-editors-entitlement
        state: present
        identifiers:
          name: Grafana Editors
          app: !KeyOf grafana-application
        attrs:
          name: Grafana Editors
          app: !KeyOf grafana-application
      - model: authentik_core.applicationentitlement
        id: grafana-viewers-entitlement
        state: present
        identifiers:
          name: Grafana Viewers
          app: !KeyOf grafana-application
        attrs:
          name: Grafana Viewers
          app: !KeyOf grafana-application
      - model: authentik_policies.policybinding
        id: grafana-admins-policy-binding
        state: present
        identifiers:
          target: !KeyOf grafana-application
          group: !KeyOf grafana-admins-group
          order: 0
        attrs:
          target: !KeyOf grafana-application
          group: !KeyOf grafana-admins-group
          order: 0
      - model: authentik_policies.policybinding
        id: grafana-editors-policy-binding
        state: present
        identifiers:
          target: !KeyOf grafana-application
          group: !KeyOf grafana-editors-group
          order: 1
        attrs:
          target: !KeyOf grafana-application
          group: !KeyOf grafana-editors-group
          order: 1
      - model: authentik_policies.policybinding
        id: grafana-viewers-policy-binding
        state: present
        identifiers:
          target: !KeyOf grafana-application
          group: !KeyOf grafana-viewers-group
          order: 2
        attrs:
          target: !KeyOf grafana-application
          group: !KeyOf grafana-viewers-group
          order: 2
      - model: authentik_policies.policybinding
        id: grafana-admins-entitlement-policy-binding
        state: present
        identifiers:
          target: !KeyOf grafana-admins-entitlement
          group: !KeyOf grafana-admins-group
          order: 0
        attrs:
          target: !KeyOf grafana-admins-entitlement
          group: !KeyOf grafana-admins-group
          order: 0
      - model: authentik_policies.policybinding
        id: grafana-editors-entitlement-policy-binding
        state: present
        identifiers:
          target: !KeyOf grafana-editors-entitlement
          group: !KeyOf grafana-editors-group
          order: 0
        attrs:
          target: !KeyOf grafana-editors-entitlement
          group: !KeyOf grafana-editors-group
          order: 0
      - model: authentik_policies.policybinding
        id: grafana-viewers-entitlement-policy-binding
        state: present
        identifiers:
          target: !KeyOf grafana-viewers-entitlement
          group: !KeyOf grafana-viewers-group
          order: 0
        attrs:
          target: !KeyOf grafana-viewers-entitlement
          group: !KeyOf grafana-viewers-group
          order: 0
