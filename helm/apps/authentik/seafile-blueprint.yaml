apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprint-seafile
  namespace: authentik
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: blueprint
    blueprints.goauthentik.io/instantiate: "true"
data:
  seafile.yaml: |
    # yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
    version: 1
    metadata:
      name: vasary-seafile-oauth
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_core.group
        id: seafile-users-group
        state: present
        identifiers:
          name: seafile-users
        attrs:
          name: seafile-users
      - model: authentik_providers_oauth2.oauth2provider
        id: seafile-oauth-provider
        state: present
        identifiers:
          name: seafile
        attrs:
          name: seafile
          client_type: confidential
          client_id: seafile
          client_secret: !Env [SEAFILE_OAUTH_CLIENT_SECRET, ""]
          grant_types:
            - authorization_code
            - refresh_token
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-explicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
          redirect_uris:
            - matching_mode: strict
              url: https://seafile.vasary.org/oauth/callback/
          sub_mode: user_email
          issuer_mode: per_provider
      - model: authentik_core.application
        id: seafile-application
        state: present
        identifiers:
          slug: seafile
        attrs:
          name: Seafile
          slug: seafile
          provider: !KeyOf seafile-oauth-provider
          policy_engine_mode: any
          meta_launch_url: https://seafile.vasary.org/
          open_in_new_tab: true
      - model: authentik_policies.policybinding
        id: seafile-users-policy-binding
        state: present
        identifiers:
          target: !KeyOf seafile-application
          group: !KeyOf seafile-users-group
          order: 0
        attrs:
          target: !KeyOf seafile-application
          group: !KeyOf seafile-users-group
          order: 0
