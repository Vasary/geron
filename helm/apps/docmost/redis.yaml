apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: docmost-redis-data
  namespace: docmost
spec:
  storageClassName: nfs
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docmost-redis
  namespace: docmost
  labels:
    app.kubernetes.io/name: docmost-redis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: docmost-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: docmost-redis
    spec:
      containers:
        - name: redis
          image: redis:8
          imagePullPolicy: IfNotPresent
          args:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory-policy
            - noeviction
          ports:
            - name: redis
              containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: docmost-redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: docmost-redis
  namespace: docmost
spec:
  selector:
    app.kubernetes.io/name: docmost-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
