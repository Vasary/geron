apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns-cloudflare
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "25"
spec:
  project: geron
  source:
    repoURL: https://kubernetes-sigs.github.io/external-dns
    chart: external-dns
    targetRevision: 1.21.1
    helm:
      releaseName: external-dns-cloudflare
      values: |
        provider:
          name: cloudflare
        sources:
          - service
        policy: upsert-only
        registry: txt
        txtOwnerId: geron-cloudflare
        txtPrefix: geron-
        domainFilters:
          - vasary.org
        extraArgs:
          annotation-filter: geron.io/dns-scope=public
          cloudflare-proxied: "true"
        env:
          - name: CF_API_TOKEN
            valueFrom:
              secretKeyRef:
                name: cloudflare-api-token
                key: api-token
                optional: true
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: kube-prometheus-stack
  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
    syncOptions:
      - CreateNamespace=true
