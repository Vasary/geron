apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubernetes-dashboard
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: applications
  sources:
    - repoURL: https://github.com/Vasary/geron.git
      targetRevision: master
      path: helm/apps/kubernetes-dashboard
    - repoURL: https://kubernetes-retired.github.io/dashboard
      chart: kubernetes-dashboard
      targetRevision: 7.14.0
      helm:
        releaseName: kubernetes-dashboard
        values: |
          app:
            ingress:
              enabled: false
            settings:
              global:
                clusterName: geron
                defaultNamespace: default
          kong:
            proxy:
              type: ClusterIP
              http:
                enabled: true
              tls:
                enabled: true
          metrics-server:
            enabled: false
          cert-manager:
            enabled: false
          nginx:
            enabled: false
          extras:
            serviceMonitor:
              enabled: true
              labels:
                release: kube-prometheus-stack
  destination:
    server: https://kubernetes.default.svc
    namespace: kubernetes-dashboard
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
