apiVersion: apps/v1
kind: Deployment
metadata:
  name: stirling-pdf
  namespace: stirling-pdf
  labels:
    app.kubernetes.io/name: stirling-pdf
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: stirling-pdf
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stirling-pdf
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: stirling-pdf
          image: docker.stirlingpdf.com/stirlingtools/stirling-pdf:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: TZ
              value: Europe/Berlin
            - name: SECURITY_ENABLELOGIN
              value: 'true'
            - name: SECURITY_LOGINMETHOD
              value: all
            - name: DISABLE_ADDITIONAL_FEATURES
              value: 'false'
            - name: SYSTEM_DEFAULTLOCALE
              value: en-US
            - name: SYSTEM_FRONTENDURL
              value: https://stirling-pdf.vasary.org
            - name: SYSTEM_BACKENDURL
              value: https://stirling-pdf.vasary.org
            - name: SECURITY_INITIALLOGIN_USERNAME
              value: admin
            - name: SECURITY_OAUTH2_ENABLED
              value: 'true'
            - name: SECURITY_OAUTH2_PROVIDER
              value: authentik
            - name: SECURITY_OAUTH2_AUTOCREATEUSER
              value: 'true'
            - name: SECURITY_OAUTH2_ISSUER
              value: https://auth.vasary.org/application/o/stirling-pdf/
            - name: SECURITY_OAUTH2_CLIENTID
              value: stirling-pdf
            - name: SECURITY_OAUTH2_SCOPES
              value: openid,profile,email
            - name: SECURITY_OAUTH2_USEASUSERNAME
              value: email
          envFrom:
            - secretRef:
                name: stirling-pdf-secrets
          volumeMounts:
            - name: configs
              mountPath: /configs
            - name: tessdata
              mountPath: /usr/share/tessdata
            - name: logs
              mountPath: /logs
            - name: pipeline
              mountPath: /pipeline
            - name: custom-files
              mountPath: /customFiles
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              memory: 4Gi
      volumes:
        - name: configs
          persistentVolumeClaim:
            claimName: stirling-pdf-configs
        - name: tessdata
          persistentVolumeClaim:
            claimName: stirling-pdf-tessdata
        - name: logs
          persistentVolumeClaim:
            claimName: stirling-pdf-logs
        - name: pipeline
          persistentVolumeClaim:
            claimName: stirling-pdf-pipeline
        - name: custom-files
          persistentVolumeClaim:
            claimName: stirling-pdf-custom-files
