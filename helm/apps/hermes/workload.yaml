apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-data
  namespace: hermes
spec:
  storageClassName: nfs
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-gateway
  namespace: hermes
  labels:
    app.kubernetes.io/name: hermes
    app.kubernetes.io/component: gateway
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes
        app.kubernetes.io/component: gateway
    spec:
      securityContext:
        fsGroup: 10000
      containers:
        - name: hermes
          image: nousresearch/hermes-agent:main
          imagePullPolicy: Always
          args:
            - gateway
            - run
          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: HERMES_UID
              value: "10000"
            - name: HERMES_GID
              value: "10000"
            - name: HERMES_TIMEZONE
              value: Europe/Berlin
            - name: HERMES_TELEGRAM_DISABLE_FALLBACK_IPS
              value: "true"
            - name: HERMES_GATEWAY_BOOTSTRAP_STATE
              value: running
          envFrom:
            - secretRef:
                name: hermes-secrets
                optional: true
          volumeMounts:
            - name: data
              mountPath: /opt/data
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-dashboard
  namespace: hermes
  labels:
    app.kubernetes.io/name: hermes
    app.kubernetes.io/component: dashboard
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes
        app.kubernetes.io/component: dashboard
    spec:
      securityContext:
        fsGroup: 10000
      containers:
        - name: hermes
          image: nousresearch/hermes-agent:main
          imagePullPolicy: Always
          args:
            - dashboard
            - --host
            - 0.0.0.0
            - --no-open
          ports:
            - name: http
              containerPort: 9119
          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: HERMES_UID
              value: "10000"
            - name: HERMES_GID
              value: "10000"
            - name: HERMES_TIMEZONE
              value: Europe/Berlin
            - name: HERMES_DASHBOARD_PUBLIC_URL
              value: https://hermes.vasary.org
          envFrom:
            - secretRef:
                name: hermes-secrets
                optional: true
          volumeMounts:
            - name: data
              mountPath: /opt/data
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-dashboard
  namespace: hermes
spec:
  selector:
    app.kubernetes.io/name: hermes
    app.kubernetes.io/component: dashboard
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hermes-dashboard
  namespace: hermes
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    geron.io/dns-scope: internal
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  tls:
    - secretName: hermes-vasary-tls
      hosts:
        - hermes.vasary.org
  rules:
    - host: hermes.vasary.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hermes-dashboard
                port:
                  name: http
