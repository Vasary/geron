apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: public-basic-auth
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "27"
spec:
  project: geron
  source:
    repoURL: https://github.com/Vasary/geron.git
    targetRevision: master
    path: helm/apps/public-basic-auth
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
    syncOptions:
      - CreateNamespace=true
