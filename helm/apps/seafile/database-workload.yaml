apiVersion: apps/v1
kind: Deployment
metadata:
  name: seafile-mariadb
  namespace: seafile
  labels:
    app.kubernetes.io/name: seafile-mariadb
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: seafile-mariadb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seafile-mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:11.4
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: 3306
          env:
            - name: MARIADB_AUTO_UPGRADE
              value: '1'
            - name: MARIADB_INITDB_SKIP_TZINFO
              value: '1'
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: MARIADB_ROOT_PASSWORD
            - name: SEAFILE_MYSQL_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: SEAFILE_MYSQL_DB_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mariadb-admin ping -h 127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD"
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mariadb-admin ping -h 127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD"
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: seafile-mariadb-data-local
        - name: initdb
          configMap:
            name: seafile-mariadb-init
            defaultMode: 493
---
apiVersion: v1
kind: Service
metadata:
  name: seafile-mariadb
  namespace: seafile
spec:
  selector:
    app.kubernetes.io/name: seafile-mariadb
  ports:
    - name: mysql
      port: 3306
      targetPort: mysql
