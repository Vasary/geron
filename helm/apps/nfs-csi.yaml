apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nfs-csi
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: geron
  source:
    repoURL: https://raw.githubusercontent.com/kubernetes-csi/csi-driver-nfs/master/charts
    chart: csi-driver-nfs
    targetRevision: 4.13.4
    helm:
      releaseName: nfs-csi
      values: |
        controller:
          replicas: 1
          runOnControlPlane: true
        storageClass:
          create: true
          name: nfs
          parameters:
            server: 10.10.10.4
            share: /mnt/blaze/k8s/pvc
            subDir: ${pvc.metadata.namespace}/${pvc.metadata.name}/${pv.metadata.name}
            mountPermissions: "0770"
            onDelete: archive
          reclaimPolicy: Delete
          volumeBindingMode: Immediate
          mountOptions:
            - nfsvers=4.1
            - hard
            - noatime
  destination:
    server: https://kubernetes.default.svc
    namespace: nfs-csi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
    syncOptions:
      - CreateNamespace=true
