apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seafile-redis-data
  namespace: seafile
spec:
  storageClassName: nfs
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seafile-redis
  namespace: seafile
  labels:
    app.kubernetes.io/name: seafile-redis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: seafile-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seafile-redis
    spec:
      containers:
        - name: redis
          image: redis:8
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - exec redis-server --appendonly yes --requirepass "$REDIS_PASSWORD"
          ports:
            - name: redis
              containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seafile-secrets
                  key: REDIS_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: seafile-redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: seafile-redis
  namespace: seafile
spec:
  selector:
    app.kubernetes.io/name: seafile-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
