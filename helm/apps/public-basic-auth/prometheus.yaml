apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: cloudflare-basic-auth
  namespace: monitoring
spec:
  basicAuth:
    secret: cloudflare-basic-auth
    realm: geron
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus-cloudflare-auth
  namespace: monitoring
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`prometheus.vasary.org`) && HeaderRegexp(`Cf-Ray`, `.+`)
      kind: Rule
      priority: 100000
      middlewares:
        - name: cloudflare-basic-auth
          namespace: monitoring
      services:
        - name: kube-prometheus-stack-prometheus
          port: 9090
  tls:
    secretName: prometheus-vasary-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus-cloudflare-auth-web
  namespace: monitoring
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`prometheus.vasary.org`) && HeaderRegexp(`Cf-Ray`, `.+`)
      kind: Rule
      priority: 100000
      middlewares:
        - name: cloudflare-basic-auth
          namespace: monitoring
      services:
        - name: kube-prometheus-stack-prometheus
          port: 9090
