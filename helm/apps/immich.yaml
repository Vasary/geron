apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: applications
  sources:
    - repoURL: https://github.com/Vasary/geron.git
      targetRevision: master
      path: helm/apps/immich
    - repoURL: ghcr.io/immich-app/immich-charts
      chart: immich
      targetRevision: 0.13.1
      helm:
        releaseName: immich
        values: |
          controllers:
            main:
              containers:
                main:
                  image:
                    tag: v3.0.3
                  env:
                    TZ: Europe/Berlin
                    REDIS_HOSTNAME: immich-valkey
                    IMMICH_MACHINE_LEARNING_URL: http://immich-machine-learning:3003
                    DB_HOSTNAME: immich-database-rw
                    DB_PORT: "5432"
                    DB_VECTOR_EXTENSION: vectorchord
                    DB_DATABASE_NAME:
                      valueFrom:
                        secretKeyRef:
                          name: immich-database-app
                          key: dbname
                    DB_USERNAME:
                      valueFrom:
                        secretKeyRef:
                          name: immich-database-app
                          key: username
                    DB_PASSWORD:
                      valueFrom:
                        secretKeyRef:
                          name: immich-database-app
                          key: password

          immich:
            configurationKind: Secret
            existingConfiguration: immich-config
            metrics:
              enabled: true
            persistence:
              library:
                existingClaim: immich-library

          valkey:
            enabled: true

          server:
            ingress:
              main:
                enabled: true
                className: traefik
                annotations:
                  cert-manager.io/cluster-issuer: letsencrypt-prod
                  geron.io/dns-scope: internal
                  traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
                hosts:
                  - host: immich.vasary.org
                    paths:
                      - path: /
                        pathType: Prefix
                        service:
                          identifier: main
                          port: http
                tls:
                  - secretName: immich-vasary-tls
                    hosts:
                      - immich.vasary.org

          machine-learning:
            persistence:
              cache:
                enabled: true
                type: persistentVolumeClaim
                storageClass: nfs
                accessMode: ReadWriteMany
                size: 10Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: immich
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
