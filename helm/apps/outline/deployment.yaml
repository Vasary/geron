apiVersion: apps/v1
kind: Deployment
metadata:
  name: outline
  namespace: outline
  labels:
    app.kubernetes.io/name: outline
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: outline
  template:
    metadata:
      labels:
        app.kubernetes.io/name: outline
    spec:
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: outline
          image: docker.getoutline.com/outlinewiki/outline:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: TZ
              value: Europe/Berlin
            - name: URL
              value: https://outline.vasary.org
            - name: PORT
              value: '3000'
            - name: FORCE_HTTPS
              value: 'true'
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: outline-postgres-local-app
                  key: uri
            - name: REDIS_URL
              value: redis://outline-redis:6379
            - name: FILE_STORAGE
              value: local
            - name: FILE_STORAGE_LOCAL_ROOT_DIR
              value: /var/lib/outline/data
            - name: FILE_STORAGE_UPLOAD_MAX_SIZE
              value: '262144000'
            - name: OIDC_CLIENT_ID
              value: outline
            - name: OIDC_AUTH_URI
              value: https://auth.vasary.org/application/o/authorize/
            - name: OIDC_TOKEN_URI
              value: http://authentik-server.authentik.svc.cluster.vasary.org/application/o/token/
            - name: OIDC_USERINFO_URI
              value: http://authentik-server.authentik.svc.cluster.vasary.org/application/o/userinfo/
            - name: OIDC_LOGOUT_URI
              value: https://auth.vasary.org/application/o/outline/end-session/
            - name: OIDC_USERNAME_CLAIM
              value: preferred_username
            - name: OIDC_DISPLAY_NAME
              value: Authentik
            - name: OIDC_SCOPES
              value: openid profile email
          envFrom:
            - secretRef:
                name: outline-secrets
          volumeMounts:
            - name: data
              mountPath: /var/lib/outline/data
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 60
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: outline-data
