apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprint-argocd
  namespace: authentik
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: blueprint
    blueprints.goauthentik.io/instantiate: "true"
data:
  argocd.yaml: |
    # yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
    version: 1
    metadata:
      name: vasary-argocd-oauth
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_core.group
        id: argocd-admins-group
        state: present
        identifiers:
          name: argocd-admins
        attrs:
          name: argocd-admins
      - model: authentik_core.group
        id: argocd-readonly-group
        state: present
        identifiers:
          name: argocd-readonly
        attrs:
          name: argocd-readonly
      - model: authentik_providers_oauth2.oauth2provider
        id: argocd-oauth-provider
        state: present
        identifiers:
          name: argocd
        attrs:
          name: argocd
          client_type: confidential
          client_id: argocd
          client_secret: !Env [ARGOCD_OAUTH_CLIENT_SECRET, ""]
          grant_types:
            - authorization_code
            - refresh_token
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-explicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
          redirect_uris:
            - matching_mode: strict
              url: https://vasary.org/api/dex/callback
            - matching_mode: strict
              url: http://localhost:8085/auth/callback
          sub_mode: user_email
          issuer_mode: per_provider
      - model: authentik_core.application
        id: argocd-application
        state: present
        identifiers:
          slug: argocd
        attrs:
          name: Argo CD
          slug: argocd
          provider: !KeyOf argocd-oauth-provider
          policy_engine_mode: any
          meta_launch_url: https://vasary.org/
          open_in_new_tab: true
      - model: authentik_policies.policybinding
        id: argocd-admins-policy-binding
        state: present
        identifiers:
          target: !KeyOf argocd-application
          group: !KeyOf argocd-admins-group
          order: 0
        attrs:
          target: !KeyOf argocd-application
          group: !KeyOf argocd-admins-group
          order: 0
      - model: authentik_policies.policybinding
        id: argocd-readonly-policy-binding
        state: present
        identifiers:
          target: !KeyOf argocd-application
          group: !KeyOf argocd-readonly-group
          order: 1
        attrs:
          target: !KeyOf argocd-application
          group: !KeyOf argocd-readonly-group
          order: 1
