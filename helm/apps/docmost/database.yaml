apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: docmost-postgres
  namespace: docmost
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18-standard-trixie
  bootstrap:
    initdb:
      database: docmost
      owner: docmost
      secret:
        name: docmost-secrets
  storage:
    storageClass: nfs
    size: 20Gi
