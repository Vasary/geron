apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: geron-cluster
  namespace: argocd
spec:
  project: default
  source:
    repoURL: __ARGOCD_REPO_URL__
    targetRevision: __ARGOCD_REVISION__
    path: __ARGOCD_ROOT_PATH__
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
