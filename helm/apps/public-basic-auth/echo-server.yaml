apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: cloudflare-authentik-auth
  namespace: echo-server
spec:
  forwardAuth:
    address: http://authentik-server.authentik.svc.cluster.vasary.org/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-Authentik-Username
      - X-Authentik-Groups
      - X-Authentik-Email
      - X-Authentik-Name
      - X-Authentik-Uid
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: echo-server-cloudflare-auth
  namespace: echo-server
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`echo.vasary.org`) && HeaderRegexp(`Cf-Ray`, `.+`)
      kind: Rule
      priority: 100000
      middlewares:
        - name: cloudflare-authentik-auth
          namespace: echo-server
      services:
        - name: echo-server
          port: 80
  tls:
    secretName: echo-vasary-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: echo-server-cloudflare-auth-web
  namespace: echo-server
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`echo.vasary.org`) && HeaderRegexp(`Cf-Ray`, `.+`)
      kind: Rule
      priority: 100000
      middlewares:
        - name: cloudflare-authentik-auth
          namespace: echo-server
      services:
        - name: echo-server
          port: 80
