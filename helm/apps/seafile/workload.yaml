apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seafile-shared
  namespace: seafile
spec:
  storageClassName: nfs
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 500Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seafile
  namespace: seafile
  labels:
    app.kubernetes.io/name: seafile
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: seafile
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seafile
    spec:
      enableServiceLinks: false
      initContainers:
        - name: prepare-config-dir
          image: busybox:1.37
          command:
            - sh
            - -c
            - mkdir -p /shared/seafile/conf
          volumeMounts:
            - name: shared
              mountPath: /shared
      containers:
        - name: seafile
          image: seafileltd/seafile-mc:13.0.25
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          env:
            - name: TIME_ZONE
              value: Europe/Berlin
            - name: SEAFILE_LOG_TO_STDOUT
              value: "true"
            - name: SITE_ROOT
              value: /
            - name: SEAFILE_SERVER_HOSTNAME
              value: seafile.vasary.org
            - name: SEAFILE_SERVER_PROTOCOL
              value: https
            - name: SEAF_SERVER_STORAGE_TYPE
              value: disk
            - name: SEAFILE_MYSQL_DB_HOST
              value: seafile-mariadb
            - name: SEAFILE_MYSQL_DB_PORT
              value: "3306"
            - name: SEAFILE_MYSQL_DB_USER
              value: seafile
            - name: SEAFILE_MYSQL_DB_CCNET_DB_NAME
              value: ccnet_db
            - name: SEAFILE_MYSQL_DB_SEAFILE_DB_NAME
              value: seafile_db
            - name: SEAFILE_MYSQL_DB_SEAHUB_DB_NAME
              value: seahub_db
            - name: CACHE_PROVIDER
              value: redis
            - name: REDIS_HOST
              value: seafile-redis
            - name: REDIS_PORT
              value: "6379"
            - name: ENABLE_NOTIFICATION_SERVER
              value: "false"
            - name: ENABLE_SEADOC
              value: "false"
            - name: ENABLE_SEAFILE_AI
              value: "false"
            - name: ENABLE_FACE_RECOGNITION
              value: "false"
            - name: MD_FILE_COUNT_LIMIT
              value: "100000"
            - name: INIT_SEAFILE_ADMIN_EMAIL
              value: admin@vasary.org
          envFrom:
            - secretRef:
                name: seafile-secrets
          volumeMounts:
            - name: shared
              mountPath: /shared
            - name: oauth-config
              mountPath: /shared/seafile/conf/seahub_settings.py
              subPath: seahub_settings.py
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 60
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              memory: 4Gi
      volumes:
        - name: shared
          persistentVolumeClaim:
            claimName: seafile-shared
        - name: oauth-config
          configMap:
            name: seafile-oauth-config
---
apiVersion: v1
kind: Service
metadata:
  name: seafile
  namespace: seafile
spec:
  selector:
    app.kubernetes.io/name: seafile
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seafile
  namespace: seafile
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    geron.io/dns-scope: internal
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  tls:
    - secretName: seafile-vasary-tls
      hosts:
        - seafile.vasary.org
  rules:
    - host: seafile.vasary.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: seafile
                port:
                  name: http
