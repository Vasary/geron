apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprint-stirling-pdf
  namespace: authentik
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: blueprint
    blueprints.goauthentik.io/instantiate: "true"
data:
  stirling-pdf.yaml: |
    # yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
    version: 1
    metadata:
      name: vasary-stirling-pdf-oauth
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_core.group
        id: stirling-pdf-users-group
        state: present
        identifiers:
          name: stirling-pdf-users
        attrs:
          name: stirling-pdf-users
      - model: authentik_providers_oauth2.oauth2provider
        id: stirling-pdf-oauth-provider
        state: present
        identifiers:
          name: stirling-pdf
        attrs:
          name: stirling-pdf
          client_type: confidential
          client_id: stirling-pdf
          client_secret: !Env [STIRLING_PDF_OAUTH_CLIENT_SECRET, ""]
          grant_types:
            - authorization_code
            - refresh_token
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-explicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
          redirect_uris:
            - matching_mode: strict
              url: https://stirling-pdf.vasary.org/login/oauth2/code/authentik
          sub_mode: user_email
          issuer_mode: per_provider
      - model: authentik_core.application
        id: stirling-pdf-application
        state: present
        identifiers:
          slug: stirling-pdf
        attrs:
          name: Stirling PDF
          slug: stirling-pdf
          provider: !KeyOf stirling-pdf-oauth-provider
          policy_engine_mode: any
          meta_launch_url: https://stirling-pdf.vasary.org/
          open_in_new_tab: true
      - model: authentik_policies.policybinding
        id: stirling-pdf-users-policy-binding
        state: present
        identifiers:
          target: !KeyOf stirling-pdf-application
          group: !KeyOf stirling-pdf-users-group
          order: 0
        attrs:
          target: !KeyOf stirling-pdf-application
          group: !KeyOf stirling-pdf-users-group
          order: 0
