apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
data:
  url: https://vasary.org
  dex.config: |
    connectors:
      - type: oidc
        id: authentik
        name: Authentik
        config:
          issuer: https://auth.vasary.org/application/o/argocd/
          clientID: argocd
          clientSecret: $dex.authentik.clientSecret
          insecureEnableGroups: true
          scopes:
            - openid
            - profile
            - email
