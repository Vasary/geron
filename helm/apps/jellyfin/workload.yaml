apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seasonvar-media
  namespace: media
spec:
  storageClassName: nfs
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 200Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config
  namespace: media
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-cache
  namespace: media
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-media
  namespace: media
spec:
  storageClassName: nfs
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 200Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: media
  labels:
    app.kubernetes.io/name: jellyfin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: jellyfin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jellyfin
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8096
          env:
            - name: TZ
              value: Europe/Berlin
          volumeMounts:
            - name: config
              mountPath: /config
            - name: cache
              mountPath: /cache
            - name: media
              mountPath: /media
            - name: seasonvar-media
              mountPath: /seasonvar
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 4Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyfin-config
        - name: cache
          persistentVolumeClaim:
            claimName: jellyfin-cache
        - name: media
          persistentVolumeClaim:
            claimName: jellyfin-media
        - name: seasonvar-media
          persistentVolumeClaim:
            claimName: seasonvar-media
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: media
spec:
  selector:
    app.kubernetes.io/name: jellyfin
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jellyfin
  namespace: media
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    geron.io/dns-scope: internal
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  tls:
    - secretName: jellyfin-vasary-tls
      hosts:
        - jellyfin.vasary.org
  rules:
    - host: jellyfin.vasary.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jellyfin
                port:
                  name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seasonvar
  namespace: media
  labels:
    app.kubernetes.io/name: seasonvar
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: seasonvar
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seasonvar
    spec:
      imagePullSecrets:
        - name: ghcr-vasary
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: seasonvar
          image: ghcr.io/vasary/go-seasonvar:v0.1.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: seasonvar-postgres-app
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seasonvar-postgres-app
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: seasonvar-postgres-app
                  key: dbname
            - name: DATABASE_URL
              value: postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@seasonvar-postgres-rw.media.svc.cluster.vasary.org:5432/$(POSTGRES_DB)?sslmode=disable
            - name: LIBRARY_PATH
              value: /library
            - name: PUBLIC_URL
              value: http://seasonvar.media.svc.cluster.vasary.org
            - name: SERVER_ADDRESS
              value: 0.0.0.0:8080
            - name: SEASONVAR_BASE_URL
              value: https://seasonvar.ru
            - name: SYNC_REQUEST_DELAY_MIN
              value: 300ms
            - name: SYNC_REQUEST_DELAY_MAX
              value: 2s
            - name: SYNC_WORKERS
              value: "2"
            - name: SYNC_TIMEOUT
              value: 30m
            - name: PLAYBACK_CACHE_TTL
              value: 10m
            - name: TZ
              value: Europe/Berlin
          volumeMounts:
            - name: library
              mountPath: /library
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: library
          persistentVolumeClaim:
            claimName: seasonvar-media
---
apiVersion: v1
kind: Service
metadata:
  name: seasonvar
  namespace: media
spec:
  selector:
    app.kubernetes.io/name: seasonvar
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: seasonvar-sync
  namespace: media
  labels:
    app.kubernetes.io/name: seasonvar
    app.kubernetes.io/component: sync
spec:
  schedule: "0 * * * *"
  timeZone: Europe/Berlin
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: seasonvar
            app.kubernetes.io/component: sync
        spec:
          restartPolicy: OnFailure
          imagePullSecrets:
            - name: ghcr-vasary
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
          containers:
            - name: seasonvar
              image: ghcr.io/vasary/go-seasonvar:v0.1.3
              imagePullPolicy: IfNotPresent
              args:
                - sync
              env:
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: seasonvar-postgres-app
                      key: username
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: seasonvar-postgres-app
                      key: password
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: seasonvar-postgres-app
                      key: dbname
                - name: DATABASE_URL
                  value: postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@seasonvar-postgres-rw.media.svc.cluster.vasary.org:5432/$(POSTGRES_DB)?sslmode=disable
                - name: LIBRARY_PATH
                  value: /library
                - name: PUBLIC_URL
                  value: http://seasonvar.media.svc.cluster.vasary.org
                - name: SERVER_ADDRESS
                  value: 0.0.0.0:8080
                - name: SEASONVAR_BASE_URL
                  value: https://seasonvar.ru
                - name: SYNC_REQUEST_DELAY_MIN
                  value: 300ms
                - name: SYNC_REQUEST_DELAY_MAX
                  value: 2s
                - name: SYNC_WORKERS
                  value: "2"
                - name: SYNC_TIMEOUT
                  value: 30m
                - name: PLAYBACK_CACHE_TTL
                  value: 10m
                - name: TZ
                  value: Europe/Berlin
              volumeMounts:
                - name: library
                  mountPath: /library
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  memory: 512Mi
          volumes:
            - name: library
              persistentVolumeClaim:
                claimName: seasonvar-media
